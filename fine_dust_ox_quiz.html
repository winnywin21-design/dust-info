<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미세먼지 확인 퀴즈</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange: #ff8a2a;
      --orange-dark: #e86f0c;
      --green: #6bcf7f;
      --red: #ff6b6b;
      --white: #ffffff;
      --txt: #2d2d4e;
      --txt2: #6b5d52;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f7ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .back-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--txt);
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .app-container {
      width: 90vw;
      aspect-ratio: 16 / 9;
      max-width: 1200px;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: url('./quiz_background.png') center center / cover no-repeat;
    }

    .app-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      z-index: 1;
      pointer-events: none;
    }

    #quizScreen,
    #resultScreen {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
    }

    .header {
      position: absolute;
      top: 3.2%;
      left: 4%;
      right: 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 3;
    }

    .title-text {
      font-size: 24px;
      font-weight: 900;
      color: var(--orange);
      text-shadow: 0 2px 8px rgba(255,255,255,0.5);
    }

    .progress-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 280px;
    }

    .prog-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.8);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .prog-fill {
      height: 100%;
      width: 0%;
      background: var(--orange);
      transition: width 0.4s ease;
    }

    .prog-label {
      font-size: 15px;
      font-weight: 800;
      color: #5f4a3b;
      text-shadow: 0 2px 8px rgba(255,255,255,0.5);
    }

    .chalkboard-zone {
      position: absolute;
      left: 27%;
      top: 18%;
      width: 47%;
      height: 55%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 3% 5% 2% 5%;
      text-align: center;
    }

    .q-num {
      font-size: 22px;
      font-weight: 900;
      color: #ffd59b;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      margin-bottom: 18px;
    }

    .q-text {
      font-size: 34px;
      font-weight: 800;
      color: #fff8eb;
      line-height: 1.45;
      word-break: keep-all;
      text-shadow: 0 2px 6px rgba(0,0,0,0.28);
      max-width: 100%;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 26px;
    }

    .btn-row {
      display: flex;
      gap: 26px;
      margin-top: auto;
      margin-bottom: 8px;
    }

    .ox-btn {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      border: 5px solid transparent;
      cursor: pointer;
      font-size: 52px;
      font-weight: 900;
      transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .ox-btn::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.18);
      pointer-events: none;
    }

    .ox-btn span {
      position: relative;
      z-index: 1;
    }

    .o-btn {
      background: linear-gradient(180deg, #fff5e8 0%, #ffe3bf 100%);
      color: var(--orange);
      border-color: #ffcc94;
    }

    .x-btn {
      background: linear-gradient(180deg, #fff1f1 0%, #ffd6d6 100%);
      color: var(--red);
      border-color: #ffb4b4;
    }

    .ox-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.03) rotate(-1deg);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.16);
    }

    .ox-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .ox-btn.selected {
      transform: scale(1.08);
      border-color: currentColor;
      box-shadow: 0 0 0 6px rgba(255,255,255,0.35), 0 12px 24px rgba(0,0,0,0.16);
      opacity: 1 !important;
    }

    .info-section {
      position: absolute;
      left: 22%;
      bottom: 4.5%;
      width: 58%;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      z-index: 3;
    }

    .exp-area {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.35s ease;
      text-align: center;
      max-width: 100%;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.85);
      padding: 16px 22px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      backdrop-filter: blur(2px);
    }

    .exp-area.show {
      opacity: 1;
      transform: translateY(0);
    }

    .exp-verdict {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .exp-text {
      font-size: 17px;
      color: #444;
      line-height: 1.5;
      font-weight: 600;
      word-break: keep-all;
    }

    .next-btn {
      padding: 15px 48px;
      border-radius: 999px;
      border: none;
      background: var(--orange);
      color: white;
      font-weight: 800;
      font-size: 20px;
      cursor: pointer;
      display: none;
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.16);
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .next-btn:hover {
      background: var(--orange-dark);
      transform: translateY(-3px);
    }

    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 40px;
    }

    .result-card {
      background: rgba(255,255,255,0.85);
      padding: 38px 42px;
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
      backdrop-filter: blur(3px);
      max-width: 760px;
    }

    .result-title {
      font-size: 54px;
      font-weight: 900;
      color: var(--txt);
      margin-bottom: 20px;
    }

    .score-text {
      font-size: 26px;
      color: var(--orange);
      font-weight: 800;
      margin-bottom: 18px;
    }

    .result-subtext {
      font-size: 16px;
      color: #6b5d52;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 34px;
    }

    .retry-btn {
      padding: 18px 60px;
      border-radius: 999px;
      border: none;
      background: var(--orange);
      color: white;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 15px rgba(0,0,0,0.16);
    }

    .retry-btn:hover {
      background: var(--orange-dark);
      transform: translateY(-3px);
    }

    @media (max-width: 1100px) {
      .title-text { font-size: 20px; }
      .q-text { font-size: 28px; min-height: 130px; }
      .ox-btn { width: 98px; height: 98px; font-size: 44px; }
      .info-section { width: 62%; left: 20%; }
      .exp-text { font-size: 15px; }
    }

    /* 휴대폰 화면 (768px 이하) */
    @media (max-width: 768px) {
      body {
        overflow: auto;
        padding: 0;
        align-items: flex-start;
        background: #f5e8d0;
      }

      .app-container {
        width: 100%;
        aspect-ratio: auto;
        height: auto;
        min-height: 100vh;
        max-width: none;
        border-radius: 0;
        background: url('./quiz_background_mobile.png') center top / cover no-repeat;
        padding: 60px 16px 24px 16px;
        display: flex;
        flex-direction: column;
        overflow: visible;
      }

      .app-container::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 245, 230, 0.2);
        z-index: 1;
        pointer-events: none;
      }

      #quizScreen {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 84px);
      }

      .header {
        position: relative;
        top: auto; left: auto; right: auto;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        margin-bottom: 16px;
      }

      .title-text {
        font-size: 22px;
        text-align: center;
        color: #8b4a0e;
        text-shadow: 0 2px 6px rgba(255, 245, 230, 0.9);
      }

      .progress-info { width: 100%; align-items: stretch; }
      .prog-track { background: rgba(255, 255, 255, 0.7); }
      .prog-label {
        text-align: right;
        font-size: 14px;
        color: #5f4a3b;
      }

      /* 문제 박스: 더 크고 여유있게, O/X 버튼 포함 */
      .chalkboard-zone {
        position: relative;
        left: auto; top: auto;
        width: 100%;
        height: auto;
        padding: 28px 22px 32px 22px;
        background: rgba(45, 45, 78, 0.92);
        border-radius: 22px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.22);
        margin-bottom: 0;
      }

      .q-num {
        font-size: 17px;
        margin-bottom: 14px;
      }
      .q-text {
        font-size: 19px;
        min-height: auto;
        margin-bottom: 26px;
        line-height: 1.55;
      }

      /* 박스 안의 O/X 버튼: 가로로 나란히, 적당한 크기 */
      .chalkboard-zone .btn-row {
        display: flex;
        gap: 24px;
        justify-content: center;
        margin-top: 0;
        margin-bottom: 4px;
      }

      .chalkboard-zone .btn-row .ox-btn {
        width: 88px;
        height: 88px;
        font-size: 40px;
        border-radius: 22px;
      }

      /* 캐릭터를 위한 빈 공간 */
      #quizScreen::after {
        content: "";
        flex: 1;
        min-height: 280px;
      }

      .info-section {
        position: relative;
        left: auto; bottom: auto;
        width: 100%;
        min-height: auto;
        margin-top: auto;
      }

      .exp-area {
        padding: 14px 16px;
        margin-bottom: 14px;
        background: rgba(255, 255, 255, 0.95);
      }
      .exp-verdict { font-size: 18px; }
      .exp-text { font-size: 14px; }

      .next-btn { padding: 12px 40px; font-size: 17px; }

      .back-btn {
        top: 12px; left: 12px;
        padding: 8px 14px;
        font-size: 13px;
      }

      .result-screen { padding: 20px; }
      .result-card {
        padding: 28px 22px;
        background: rgba(255, 255, 255, 0.92);
      }
      .result-title { font-size: 36px; margin-bottom: 14px; }
      .score-text { font-size: 20px; }
      .result-subtext { font-size: 14px; margin-bottom: 24px; }
      .retry-btn { padding: 14px 40px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html">← 돌아가기</a>
  <div class="app-container">
    <div id="quizScreen">
      <div class="header">
        <div class="title-text">미세먼지 확인 퀴즈</div>
        <div class="progress-info">
          <div class="prog-track">
            <div class="prog-fill" id="progFill"></div>
          </div>
          <div class="prog-label" id="progLabel">0 / 7</div>
        </div>
      </div>

      <div class="chalkboard-zone">
        <div class="q-num" id="qNum">문제 01</div>
        <div class="q-text" id="qText">미세먼지는 눈에 너무 잘 보여서 피하기 쉽다.</div>

        <div class="btn-row">
          <button class="ox-btn o-btn" id="oBtn" onclick="handleAnswer(true)"><span>O</span></button>
          <button class="ox-btn x-btn" id="xBtn" onclick="handleAnswer(false)"><span>X</span></button>
        </div>
      </div>

      <div class="info-section">
        <div class="exp-area" id="expArea">
          <div class="exp-verdict" id="expVerdict">정답입니다!</div>
          <div class="exp-text" id="expText">해설 내용</div>
        </div>
        <button class="next-btn" id="nextBtn" onclick="goNext()">NEXT</button>
      </div>
    </div>

    <div id="resultScreen" class="result-screen">
      <div class="result-card">
        <div class="result-title">퀴즈 종료</div>
        <div class="score-text" id="scoreText">7문제 중 5문제를 맞혔습니다.</div>
        <div class="result-subtext">이제 미세먼지로 대푯값을 공부해보러 가볼까요~?</div>
        <button class="retry-btn" onclick="resetQuiz()">다시 도전하기</button>
      </div>
    </div>
  </div>

  <script>
    const quizData = [
      {
        q: "미세먼지는 눈에 너무 잘 보여서 피하기 쉽다.",
        answer: false,
        exp: "미세먼지는 우리 눈에 보이지 않을 정도로 아주 작습니다. 그래서 대기 오염 수치를 수시로 확인하는 습관이 중요합니다."
      },
      {
        q: "미세먼지 농도는 월요일부터 일요일까지 매일 똑같다.",
        answer: false,
        exp: "미세먼지 농도는 바람의 방향, 비의 유무, 오염물질 배출량 등 여러 원인에 따라 요일마다 계속해서 변합니다."
      },
      {
        q: "돼지고기를 먹으면 몸속 미세먼지가 씻겨 내려간다.",
        answer: false,
        exp: "돼지고기 기름이 먼지를 씻어준다는 말은 과학적 근거가 없습니다. 오히려 물을 자주 마셔 호흡기 점막을 촉촉하게 유지하는 것이 배출에 효과적입니다."
      },
      {
        q: "미세먼지 농도가 '81'부터는 '나쁨' 단계에 해당한다.",
        answer: true,
        exp: "미세먼지 수치가 81에서 150 사이일 때 '나쁨' 등급으로 분류합니다. 이 수치부터는 야외 활동 시 반드시 마스크를 착용해야 합니다."
      },
      {
        q: "KF80 마스크는 미세먼지를 80% 이상 막아준다는 뜻이다.",
        answer: true,
        exp: "마스크 이름 뒤의 숫자는 차단율을 의미합니다. KF80은 미세 입자를 80% 이상 걸러주는 성능을 인증받은 제품입니다."
      },
      {
        q: "미세먼지는 초미세먼지보다 크기가 더 작다.",
        answer: false,
        exp: "초미세먼지가 미세먼지보다 훨씬 더 작습니다. 미세먼지(PM-10)는 지름 10µm 이하, 초미세먼지(PM-2.5)는 2.5µm 이하의 입자를 말합니다."
      },
      {
        q: "미세먼지 '주의보'는 농도가 150이 넘을 때 발령된다.",
        answer: true,
        exp: "미세먼지 농도가 150µg/m³ 이상인 상태가 2시간 넘게 지속될 것으로 예상될 때 주의보가 발령되어 위험을 알립니다."
      }
    ];

    let currentIdx = 0;
    let correctCount = 0;

    function initQuestion() {
      const qData = quizData[currentIdx];

      document.getElementById('qNum').textContent = `문제 ${String(currentIdx + 1).padStart(2, '0')}`;
      document.getElementById('qText').textContent = qData.q;
      document.getElementById('progLabel').textContent = `${currentIdx} / ${quizData.length}`;
      document.getElementById('progFill').style.width = `${(currentIdx / quizData.length) * 100}%`;

      document.getElementById('expArea').classList.remove('show');
      document.getElementById('nextBtn').style.display = 'none';

      const oBtn = document.getElementById('oBtn');
      const xBtn = document.getElementById('xBtn');
      oBtn.disabled = false;
      xBtn.disabled = false;
      oBtn.classList.remove('selected');
      xBtn.classList.remove('selected');
    }

    function handleAnswer(userSelect) {
      const qData = quizData[currentIdx];
      const isCorrect = userSelect === qData.answer;

      if (isCorrect) correctCount++;

      const oBtn = document.getElementById('oBtn');
      const xBtn = document.getElementById('xBtn');

      oBtn.disabled = true;
      xBtn.disabled = true;

      if (userSelect) oBtn.classList.add('selected');
      else xBtn.classList.add('selected');

      const verdict = document.getElementById('expVerdict');
      verdict.textContent = isCorrect ? "정답입니다! ✨" : "틀렸습니다. 😥";
      verdict.style.color = isCorrect ? "var(--green)" : "var(--red)";

      document.getElementById('expText').textContent = qData.exp;
      document.getElementById('expArea').classList.add('show');
      document.getElementById('nextBtn').style.display = 'inline-block';

      document.getElementById('progFill').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
    }

    function goNext() {
      currentIdx++;
      if (currentIdx < quizData.length) {
        initQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
      document.getElementById('quizScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'flex';
      document.getElementById('scoreText').textContent = `${quizData.length}문제 중 ${correctCount}문제를 맞혔습니다!`;
    }

    function resetQuiz() {
      currentIdx = 0;
      correctCount = 0;
      document.getElementById('quizScreen').style.display = 'block';
      document.getElementById('resultScreen').style.display = 'none';
      initQuestion();
    }
    initQuestion();
  </script>
</body>
</html>
