<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미세먼지 QR 콘텐츠</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Arial, "Noto Sans KR", sans-serif;
      padding: 0;
    }
    .wrap {
      position: relative;
      width: min(100vw, 1500px);
      aspect-ratio: 2048 / 1364;
      background: #ffffff;
      overflow: hidden;
    }
    .bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hit {
      position: absolute;
      left: 24.8%;
      width: 50.4%;
      border-radius: 40px;
      text-indent: -9999px;
      overflow: hidden;
      background: rgba(255,255,255,0);
    }
    .hit:hover,
    .hit:focus,
    .hit:focus-visible,
    .hit:active {
      outline: none;
      background: transparent;
      box-shadow: none;
    }
    .hit.top { top: 34.8%; height: 18.5%; }
    .hit.bottom { top: 79.2%; height: 18.5%; }
    .hit::-moz-focus-inner { border: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="bg" src="button_image.png" alt="미세먼지 콘텐츠 선택 버튼" />
    <a class="hit top" href="about_fine_dust.html" aria-label="미세먼지 탐험 시작"></a>
    <a class="hit bottom" href="fine_dust_ox_quiz.html" aria-label="미세먼지 OX 도전"></a>
  </div>
</body>
</html>
